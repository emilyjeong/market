<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>단지 검색</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a09;--surface:#0f0f0e;--card:#161513;--card-hi:#1c1b19;
  --border:#2a2926;--border-mid:#353330;
  --ink:#f0ede8;--ink-mid:#9a9690;--ink-dim:#565250;
  --pos:#00c98a;--neg:#f04d62;--accent:#e8b800;--info:#5aabf0;
  --radius:14px;--radius-sm:8px;--pad:16px;
  --font-sans:'Pretendard',-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100%;background:var(--bg)!important;font-family:var(--font-sans);color:var(--ink);color-scheme:dark;}

#header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px var(--pad);position:sticky;top:0;z-index:100;}
.h-title{font-size:16px;font-weight:700;color:var(--ink);}
.h-sub{font-size:11px;color:var(--ink-dim);margin-top:2px;font-family:var(--font-mono);}

#content{max-width:480px;margin:0 auto;padding:12px var(--pad);padding-bottom:max(40px,env(safe-area-inset-bottom));}

.search-card{background:var(--card-hi);border:1px solid var(--border-mid);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.input-row{display:flex;flex-direction:column;gap:8px;}
.input-line{display:flex;gap:6px;}
input[type="text"]{flex:1;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-sans);font-size:13px;color:var(--ink);outline:none;transition:border-color .2s;}
input[type="text"]:focus{border-color:var(--info);}
input[type="text"]::placeholder{color:var(--ink-dim);}
#search-btn{padding:10px 16px;background:rgba(90,171,240,.12);border:1px solid rgba(90,171,240,.35);border-radius:var(--radius-sm);font-size:13px;font-weight:600;color:var(--info);cursor:pointer;font-family:var(--font-sans);white-space:nowrap;}
#search-btn:disabled{opacity:.4;cursor:not-allowed;}

#status{font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-family:var(--font-mono);text-align:center;padding:6px;}
#status.loading{color:var(--accent);}
#status.error{color:var(--neg);}

.result-count{font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-family:var(--font-mono);font-weight:600;}

.result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;}
.r-name-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.r-name{flex:1;font-size:14px;font-weight:700;color:var(--ink);font-family:var(--font-sans);word-break:break-all;}
.copy-btn{padding:6px 14px;background:rgba(0,201,138,.12);border:1px solid rgba(0,201,138,.35);border-radius:var(--radius-sm);font-size:11px;font-weight:600;color:var(--pos);cursor:pointer;font-family:var(--font-sans);flex-shrink:0;transition:all .15s;}
.copy-btn.copied{background:rgba(232,184,0,.12);border-color:rgba(232,184,0,.35);color:var(--accent);}

.r-region{font-size:12px;color:var(--ink-mid);margin-bottom:8px;}
.r-region .pin{color:var(--ink-dim);margin-right:4px;}

.r-chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{font-size:10px;color:var(--ink-mid);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-family:var(--font-mono);}

.empty{text-align:center;padding:40px 20px;color:var(--ink-dim);font-size:13px;}
.empty-icon{font-size:32px;margin-bottom:8px;}

#error{display:none;background:rgba(240,77,98,.08);border:1px solid rgba(240,77,98,.25);border-radius:var(--radius-sm);padding:12px;color:var(--neg);font-size:12px;margin-bottom:12px;line-height:1.5;}

#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card-hi);border:1px solid var(--border-mid);border-radius:20px;padding:8px 18px;font-size:13px;color:var(--ink);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:300;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="header">
<div class="h-title">🔍 단지 검색</div>
<div class="h-sub">국토교통부 · 전국 K-apt 단지</div>
</div>

<div id="content">

<div class="search-card">
<div class="input-row">
<div class="input-line">
<input type="text" id="query" placeholder="단지명 (예: 남산타운)" onkeypress="if(event.key==='Enter') doSearch()">
</div>
<div class="input-line">
<input type="text" id="region" placeholder="시군구 (선택, 예: 종로구)" onkeypress="if(event.key==='Enter') doSearch()">
<button id="search-btn" onclick="doSearch()">검색</button>
</div>
</div>
</div>

<div id="status">초기화 중...</div>
<div id="error"></div>

<div id="empty" class="empty" style="display:none;">
<div class="empty-icon">🔎</div>
<div>단지명 또는 시군구로 검색!</div>
</div>

<div id="results"></div>
 
</div>

<div id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbybVombj1cZKYDuO7rD8XRHjN_hkYt_m8jdmcUz5GWXznhX-ORrY0TTzsqxXBMTeLCSww/exec';
const CACHE_KEY    = 'aptMasterV2';
const CACHE_TS_KEY = 'aptMasterAtV2';
const ONE_DAY = 24 * 60 * 60 * 1000;

var aptList  = [];
var isLoaded = false;

loadMaster();

function setStatus(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

function loadMaster() {
  // 캐시 확인 (24시간)
  try {
    var cached   = localStorage.getItem(CACHE_KEY);
    var cachedAt = parseInt(localStorage.getItem(CACHE_TS_KEY) || '0');
    if (cached && (Date.now() - cachedAt < ONE_DAY)) {
      aptList  = JSON.parse(cached);
      isLoaded = true;
      var hours = Math.floor((Date.now() - cachedAt) / (60 * 60 * 1000));
      setStatus(aptList.length.toLocaleString() + '개 단지 · 캐시 (' + hours + '시간 전)');
      document.getElementById('empty').style.display = 'block';
      return;
    }
  } catch(e) { /* 캐시 못 읽으면 새로 받기 */ }

  setStatus('전국 단지 데이터 받는 중...', 'loading');

  fetch(SCRIPT_URL + '?action=aptlist')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(json) {
      if (!json.ok) throw new Error('서버 오류');
      aptList  = json.items || [];
      isLoaded = true;
      setStatus(aptList.length.toLocaleString() + '개 단지 로딩됨 ✓');

      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(aptList));
        localStorage.setItem(CACHE_TS_KEY, Date.now().toString());
      } catch(e) { /* localStorage 꽉 차도 무시 */ }

      document.getElementById('empty').style.display = 'block';
    })
    .catch(function(e) {
      setStatus('로딩 실패: ' + e.message, 'error');
      var err = document.getElementById('error');
      err.innerHTML = '⚠️ 단지 데이터 로딩 실패.<br>잠시 후 새로고침 해봐!';
      err.style.display = 'block';
    });
}

function doSearch() {
  if (!isLoaded) { showToast('아직 데이터 로딩 중!'); return; }

  var q      = document.getElementById('query').value.trim();
  var region = document.getElementById('region').value.trim();

  if (!q && !region) { showToast('단지명이나 시군구 중 하나는 입력해줘!'); return; }

  document.getElementById('empty').style.display = 'none';

  var qN      = normalize(q);
  var regionN = normalize(region);

  var filtered = aptList.filter(function(a) {
    var nameMatch   = !qN      || normalize(a.kaptName).indexOf(qN) >= 0;
    var regionMatch = !regionN || normalize(a.as2).indexOf(regionN) >= 0
                               || normalize(a.as1).indexOf(regionN) >= 0;
    return nameMatch && regionMatch;
  });

  renderResults(filtered.slice(0, 100), filtered.length);
}

function normalize(s) {
  return (s || '').toString().toLowerCase().replace(/\s/g, '');
}

function renderResults(items, totalCount) {
  var container = document.getElementById('results');
  if (items.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">😅</div><div>결과 없음. 검색어 다시 확인해줘!</div></div>';
    return;
  }

  var html = '<div class="result-count">'
    + items.length + '개 표시'
    + (totalCount > items.length ? ' (전체 ' + totalCount + '개)' : '')
    + '</div>';

  items.forEach(function(a) {
    var copyText = a.kaptName;
    var region   = [a.as1, a.as2, a.as3, a.as4].filter(function(x){return x;}).join(' ');

    html += '<div class="result-card">'
      + '<div class="r-name-row">'
      + '<div class="r-name">' + escapeHtml(a.kaptName) + '</div>'
      + '<button class="copy-btn" onclick="copyText(this,\'' + escapeAttr(copyText) + '\')">복사</button>'
      + '</div>'
      + '<div class="r-region"><span class="pin">📍</span>' + escapeHtml(region) + '</div>'
      + '<div class="r-chips">'
      + '<span class="chip">' + escapeHtml(a.kaptCode) + '</span>'
      + '<span class="chip">법정동 ' + escapeHtml(a.bjdCode) + '</span>'
      + '</div>'
      + '</div>';
  });
  container.innerHTML = html;
}

function copyText(btn, text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){ markCopied(btn, text); })
      .catch(function(){ fallbackCopy(btn, text); });
  } else {
    fallbackCopy(btn, text);
  }
}

function markCopied(btn, text) {
  btn.textContent = '복사됨 ✓';
  btn.classList.add('copied');
  showToast('"' + text + '" 복사됐어!');
  setTimeout(function(){ btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
}

function fallbackCopy(btn, text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); markCopied(btn, text); }
  catch(e) { showToast('복사 실패 ㅠ'); }
  document.body.removeChild(ta);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

function escapeHtml(s) {
  return (s||'').toString().replace(/[&<>"']/g,function(c){
    return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function escapeAttr(s) {
  return (s||'').toString().replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
